name: "tagged-release"

permissions: write-all

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'

jobs:
  tagged-release:
    name: "Tagged Release"
    runs-on: "ubuntu-latest"

    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 18.x
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'npm'
      - run: npm ci
      - run: npm run build:webport
      - run: mv dist/webport/index.html dist/webport/build.html

      - name: Read package version
        id: package_version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"
     
      - name: Generate checksum
        uses: jmgilman/actions-generate-checksum@v1
        with:
          patterns: |
            dist/webport/*.html

      - uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          title: "Melon v${{ steps.package_version.outputs.version }}"
          automatic_release_tag: "v${{ steps.package_version.outputs.version }}"
          prerelease: false
          files: |
            dist/webport/build.html
            checksum.txt
