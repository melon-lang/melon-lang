name: Build Shortcut Artifact

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "shortcut/**"
      - "src/syscall.ts"
      - ".github/workflows/cherri-shortcut.yml"
  pull_request:
    paths:
      - "shortcut/**"
      - "src/syscall.ts"
      - ".github/workflows/cherri-shortcut.yml"

jobs:
  build-shortcut:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tap Cherri repository
        run: |
          brew update
          brew tap electrikmilk/cherri

      - name: Install Cherri CLI
        run: |
          set -euo pipefail
          if brew install electrikmilk/cherri/cherri; then
            echo "Installed stable Cherri formula"
          else
            echo "Stable install failed (likely checksum drift). Retrying with --HEAD..."
            brew uninstall electrikmilk/cherri/cherri || true
            brew install --HEAD electrikmilk/cherri/cherri
          fi

      - name: Verify Cherri
        run: cherri --version

      - name: Compile shortcut
        working-directory: shortcut
        run: cherri melon.cherri

      - name: Upload shortcut artifact
        uses: actions/upload-artifact@v4
        with:
          name: melon-shortcut
          path: shortcut/melon.shortcut
          if-no-files-found: error
