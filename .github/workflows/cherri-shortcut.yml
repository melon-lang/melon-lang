name: Build Shortcut Artifact

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "shortcut/**"
      - "src/syscall.ts"
      - ".github/workflows/cherri-shortcut.yml"
  pull_request:
    paths:
      - "shortcut/**"
      - "src/syscall.ts"
      - ".github/workflows/cherri-shortcut.yml"

jobs:
  build-shortcut:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cherri CLI
        run: brew install electrikmilk/cherri/cherri

      - name: Verify Cherri
        run: cherri --version

      - name: Compile shortcut
        working-directory: shortcut
        run: cherri melon.cherri

      - name: Upload shortcut artifact
        uses: actions/upload-artifact@v4
        with:
          name: melon-shortcut
          path: shortcut/melon.shortcut
          if-no-files-found: error
